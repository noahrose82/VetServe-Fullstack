<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="m-0">Edit Service Request</h2>

  <a class="btn btn-outline-secondary" routerLink="/service-requests">
    Back
  </a>
</div>

<div *ngIf="loading" class="alert alert-info">
  Loading request...
</div>

<div *ngIf="!loading && error" class="alert alert-danger">
  {{ error }}
</div>

<form *ngIf="!loading && !error" (ngSubmit)="onSubmit()" class="card p-3">
  <div class="row g-3">
    <div class="col-md-3">
      <label class="form-label">Veteran ID</label>
      <input
        type="number"
        class="form-control"
        name="veteranId"
        [(ngModel)]="form.veteranId"
        required
        min="1"
      />
    </div>

    <div class="col-md-4">
      <label class="form-label">Category</label>
      <select
        class="form-select"
        name="category"
        [(ngModel)]="form.category"
        required
      >
        <option value="Benefits">Benefits</option>
        <option value="Housing">Housing</option>
        <option value="Healthcare">Healthcare</option>
        <option value="Employment">Employment</option>
        <option value="Education">Education</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="col-md-3">
      <label class="form-label">Status</label>
      <select
        class="form-select"
        name="status"
        [(ngModel)]="form.status"
        required
      >
        <option value="Open">Open</option>
        <option value="In Progress">In Progress</option>
        <option value="Closed">Closed</option>
      </select>
    </div>

    <div class="col-12">
      <label class="form-label">Description</label>
      <textarea
        class="form-control"
        rows="4"
        name="description"
        [(ngModel)]="form.description"
        required
      ></textarea>
    </div>
  </div>

  <div class="mt-3 d-flex gap-2">
    <button class="btn btn-primary" type="submit" [disabled]="saving">
      {{ saving ? 'Saving...' : 'Save Changes' }}
    </button>

    <a class="btn btn-outline-secondary" routerLink="/service-requests">
      Cancel
    </a>
  </div>
</form>
