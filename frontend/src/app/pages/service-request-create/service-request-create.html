<div class="container mt-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-0">New Service Request</h2>

    <a class="btn btn-sm btn-outline-secondary" [routerLink]="['/service-requests']">
      Back
    </a>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="card">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Veteran ID</label>
        <input class="form-control" type="number" [(ngModel)]="form.veteranId" name="veteranId" />
      </div>

      <div class="mb-3">
        <label class="form-label">Category</label>
        <select class="form-select" [(ngModel)]="form.category" name="category">
          <option value="" disabled selected>Select a category</option>
          <option value="Benefits">Benefits</option>
          <option value="Housing">Housing</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Employment">Employment</option>
          <option value="Education">Education</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" rows="4" [(ngModel)]="form.description" name="description"></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Status</label>
        <select class="form-select" [(ngModel)]="form.status" name="status">
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Closed">Closed</option>
        </select>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary" (click)="save()" [disabled]="saving">
          {{ saving ? 'Saving...' : 'Create Request' }}
        </button>

        <a class="btn btn-outline-secondary" [routerLink]="['/service-requests']">
          Cancel
        </a>
      </div>
    </div>
  </div>
</div>
